{% extends 'base.html' %}

{% block page_title %}公司信息设置{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>公司信息设置</h2>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">公司名称</label>
                    <input type="text" name="company_name" class="form-control" value="{{ setting.company_name }}" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">公司Logo</label>
                    {% if setting.logo %}
                    <div class="mb-2">
                        <img src="{{ setting.logo.url }}" alt="Logo" style="max-height: 60px;">
                    </div>
                    {% endif %}
                    <input type="file" name="logo" class="form-control" accept="image/*">
                    <small class="text-muted">推荐尺寸：200x60px，支持jpg、png</small>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">公司地址</label>
                    <input type="text" name="address" class="form-control" value="{{ setting.address|default:'' }}">
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">联系电话</label>
                    <input type="text" name="phone" class="form-control" value="{{ setting.phone|default:'' }}">
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">公司邮箱</label>
                    <input type="email" name="email" class="form-control" value="{{ setting.email|default:'' }}">
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">公司网站</label>
                    <input type="url" name="website" class="form-control" value="{{ setting.website|default:'' }}">
                </div>
                
                <div class="col-12 mb-3">
                    <label class="form-label">邮件签名</label>
                    <textarea name="email_signature" class="form-control" rows="4" placeholder="邮件签名，支持HTML">{{ setting.email_signature|default:'' }}</textarea>
                    <small class="text-muted">发送邮件时会自动添加到邮件末尾</small>
                </div>
            </div>
            
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">保存设置</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">返回</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
