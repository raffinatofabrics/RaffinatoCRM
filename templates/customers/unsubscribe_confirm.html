<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>退订邮件 - Raffinato CRM</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 20px; }
        p { color: #666; line-height: 1.6; margin-bottom: 25px; }
        .email { 
            background: #f0f0f0; 
            padding: 10px; 
            border-radius: 8px;
            font-family: monospace;
            word-break: break-all;
        }
        button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #c82333; }
        .cancel {
            background: #6c757d;
            margin-left: 10px;
        }
        .cancel:hover { background: #5a6268; }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        {% if already_unsubscribed %}
            <h1>📧 已退订</h1>
            <p>邮箱 <strong class="email">{{ email }}</strong> 已经退订，不会再收到我们的邮件。</p>
            <p>如果这是误操作，请联系我们恢复订阅。</p>
        {% else %}
            <h1>📧 退订邮件</h1>
            <p>确认从以下邮箱退订邮件：</p>
            <div class="email">{{ email }}</div>
            <div class="warning">
                ⚠️ 退订后您将不再收到任何营销邮件
            </div>
            <form method="post">
                {% csrf_token %}
                <label>
                    退订原因（可选）：
                    <select name="reason" style="width:100%; padding:8px; margin-top:10px;">
                        <option value="收到太多邮件">收到太多邮件</option>
                        <option value="内容不相关">内容不相关</option>
                        <option value="不再需要">不再需要</option>
                        <option value="从未订阅过">从未订阅过</option>
                    </select>
                </label>
                <br>
                <button type="submit">确认退订</button>
                <button type="button" class="cancel" onclick="window.close()">取消</button>
            </form>
        {% endif %}
    </div>
</body>
</html>
